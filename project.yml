name: CalBalance
options:
  bundleIdPrefix: com.kamal.calbalance
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  CalBalance:
    type: application
    platform: iOS
    sources:
      - path: CalBalance
    resources:
      - path: CalBalance/Assets.xcassets
      - path: CalBalance/Resources/CommonFoods.json
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kamal.calbalance
        INFOPLIST_FILE: CalBalance/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: CalBalance/Info.plist
      properties:
        CFBundleDisplayName: CalBalance
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "CalBalance a besoin d'accéder à vos données Santé (calories actives, calories au repos, pas, exercice) pour calculer précisément votre dépense énergétique quotidienne."
        NSHealthUpdateUsageDescription: "CalBalance souhaite enregistrer les calories que vous consommez dans l'app Santé afin de centraliser votre suivi nutritionnel."
        NSCameraUsageDescription: "CalBalance a besoin d'accéder à l'appareil photo pour prendre une photo de vos repas et estimer les calories."
        NSPhotoLibraryUsageDescription: "CalBalance a besoin d'accéder à vos photos pour analyser une photo de repas existante."
    entitlements:
      path: CalBalance/CalBalance.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies: []

schemes:
  CalBalance:
    build:
      targets:
        CalBalance: all
    run:
      config: Debug
    archive:
      config: Release
